{% extends 'blood/base.html' %}

{% block css %}
<style>
    .prediction-card {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 30px;
        color: white;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 10px;
        margin-bottom: 15px;
    }
    .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
        color: white;
        box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.1);
    }
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }
    .result-card {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
    }
    .result-high {
        background: rgba(40, 167, 69, 0.2);
        border: 1px solid rgba(40, 167, 69, 0.3);
    }
    .result-low {
        background: rgba(220, 53, 69, 0.2);
        border: 1px solid rgba(220, 53, 69, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="prediction-card">
                <h2 class="text-center mb-4">Blood Donation Prediction</h2>
                <p class="text-center mb-4">Enter your donation history to predict likelihood of future donations</p>
                
                <form id="predictionForm" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="Recency" class="form-label">Months since last donation</label>
                        <input type="number" class="form-control" id="Recency" name="Recency" required>
                    </div>
                    <div class="mb-3">
                        <label for="Frequency" class="form-label">Total number of donations</label>
                        <input type="number" class="form-control" id="Frequency" name="Frequency" required>
                    </div>
                    <div class="mb-3">
                        <label for="Monetary" class="form-label">Total blood donated (in cc)</label>
                        <input type="number" class="form-control" id="Monetary" name="Monetary" required>
                    </div>
                    <div class="mb-3">
                        <label for="Time" class="form-label">Months since first donation</label>
                        <input type="number" class="form-control" id="Time" name="Time" required>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-calculator me-2"></i>Predict
                        </button>
                    </div>
                </form>

                <div id="resultCard" class="result-card">
                    <h4 class="text-center mb-3">Prediction Result</h4>
                    <p class="text-center mb-0" id="predictionResult"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('predictionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    fetch('{% url "predict_donation" %}', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        const resultCard = document.getElementById('resultCard');
        const predictionResult = document.getElementById('predictionResult');
        
        if (data.prediction === 1) {
            resultCard.className = 'result-card result-high';
            predictionResult.innerHTML = '<i class="fas fa-check-circle text-success me-2"></i>High likelihood of donating blood in the future';
        } else {
            resultCard.className = 'result-card result-low';
            predictionResult.innerHTML = '<i class="fas fa-times-circle text-danger me-2"></i>Low likelihood of donating blood in the future';
        }
        
        resultCard.style.display = 'block';
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred while making the prediction.');
    });
});
</script>

{% endblock %}
